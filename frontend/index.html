<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SkyCMD</title>
  <link rel="stylesheet" href="css/theme.css">
  <link rel="stylesheet" href="css/layout.css">
  <link rel="stylesheet" href="css/controls.css">
  <link rel="stylesheet" href="css/skymap.css">
  <link rel="stylesheet" href="css/panels.css">
  <link rel="stylesheet" href="css/legend.css">
</head>
<body>
  <header class="site-header">
    <div class="site-header__title-group">
      <h1 class="site-title">&#128301; SkyCMD</h1>
      <span class="version-badge" id="version-badge">v0.1.0</span>
    </div>
  </header>

  <main class="app-layout">
    <!-- Linkes Control-Panel -->
    <aside id="controls" class="control-panel">
      <section class="control-section control-section--first">
        <h2 class="control-section__title">&#128205; Beobachtungsposten</h2>
        <div class="form-row">
          <label class="form-label" for="lat-input">Breite:</label>
          <input type="number" id="lat-input" value="51.48" step="0.01" min="-90" max="90">
        </div>
        <div class="form-row">
          <label class="form-label" for="lon-input">Laenge:</label>
          <input type="number" id="lon-input" value="11.97" step="0.01" min="-180" max="180">
        </div>
        <div class="form-row">
          <label class="form-label" for="datetime-input">Zeit:</label>
          <input type="datetime-local" id="datetime-input">
        </div>
      </section>

      <section class="control-section">
        <h2 class="control-section__title">&#127775; Sterne</h2>
        <div class="form-row">
          <label class="form-label" for="showStars">Sterne anzeigen</label>
          <input type="checkbox" id="showStars" checked>
        </div>
        <div class="form-row">
          <label class="form-label" for="showStarNames">Sternnamen</label>
          <input type="checkbox" id="showStarNames" checked>
        </div>
        <div class="form-row">
          <label class="form-label" for="mag-limit">Mag-Limit: <span id="mag-label">6.5</span></label>
          <input type="range" id="mag-limit" min="3" max="7" step="0.5" value="6.5"
            oninput="document.getElementById('mag-label').textContent=this.value">
        </div>
      </section>

      <section class="control-section">
        <h2 class="control-section__title">&#9733; Deep-Sky</h2>
        <div class="form-row">
          <label class="form-label" for="showDSO">DSO anzeigen</label>
          <input type="checkbox" id="showDSO" checked>
        </div>
        <div class="form-row">
          <label class="form-label" for="showDSOLabels">DSO-Bezeichnungen</label>
          <input type="checkbox" id="showDSOLabels" checked>
        </div>
      </section>

      <section class="control-section">
        <h2 class="control-section__title">&#9654; Sternbilder</h2>
        <div class="form-row">
          <label class="form-label" for="showConstellationLines">Linien</label>
          <input type="checkbox" id="showConstellationLines" checked>
        </div>
        <div class="form-row">
          <label class="form-label" for="showConstellationBoundaries">IAU-Grenzen</label>
          <input type="checkbox" id="showConstellationBoundaries">
        </div>
      </section>
    </aside>

    <!-- Sternkarte -->
    <section id="map-container" class="map-area">
      <canvas id="sky-canvas"></canvas>
    </section>

    <!-- Legende rechts (Platzhalter) -->
    <aside id="legend-panel" class="legend-panel">
      <div class="legend-title">Legende</div>
      <div class="legend-item"><span class="legend-dot" style="background:#ffff88"></span> Offener Haufen</div>
      <div class="legend-item"><span class="legend-dot" style="background:#ffaa44"></span> Kugelhaufen</div>
      <div class="legend-item"><span class="legend-dot" style="background:#88ff88"></span> Emissionsnebel</div>
      <div class="legend-item"><span class="legend-dot" style="background:#ffaaff"></span> Galaxie</div>
      <div class="legend-item"><span class="legend-dot" style="background:#44ffff"></span> Planet. Nebel</div>
    </aside>
  </main>

  <script type="module" src="src/main.js"></script>
</body>
</html>
